<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5 text-center">
  <img id="img" width="250">
  <h2 id="name"></h2>
  <h4 id="price"></h4>

  <button class="btn btn-success mt-3" onclick="addToCart()">
    Add to Cart
  </button>
</div>

<script>
let product = JSON.parse(localStorage.getItem("selected"));

document.getElementById("img").src = product.image;
document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = "₹" + product.price;

function addToCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({ name: product.name, price: product.price, qty: 1 });
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}
</script>

</body>
</html>
